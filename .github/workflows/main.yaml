name: Fetch & Strictest Google + Download Speed Test (稳定版)

on:
  schedule:
    - cron: "0 21 * * *"      # 北京时间每天早上 5:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Config Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Download raw proxies & stars
        env:
          PROXIES_URL: ${{ secrets.PROXIES_URL }}
        run: |
          echo "📥 下载 stars.svg..."
          timeout 15 curl -f -L "https://api.star-history.com/svg?repos=PuddinCat/BestClash&type=Date" -o stars.svg || echo "⚠️ stars.svg 下载失败，继续"

          echo "📥 下载原始代理列表..."
          curl -f -L "$PROXIES_URL" -o raw_proxies.yaml || { echo "❌ 无法下载原始 proxies"; exit 1; }

      - name: Deduplicate proxies
        run: |
          echo "🔄 开始节点去重..."
          cat > dedup.py << 'EOF'
import yaml
import hashlib
with open('raw_proxies.yaml', 'r', encoding='utf-8') as f:
    data = yaml.safe_load(f) or {}
proxies = data.get('proxies', [])
seen = {}
unique = []
for p in proxies:
    if not isinstance(p, dict) or not p.get('server') or not p.get('port'):
        continue
    key = hashlib.md5(f"{p.get('type')}|{p.get('server')}|{p.get('port')}|{p.get('password') or ''}".encode()).hexdigest()
    if key not in seen:
        seen[key] = True
        unique.append(p)
data['proxies'] = unique
with open('proxies_dedup.yaml', 'w', encoding='utf-8') as f:
    yaml.dump(data, f, allow_unicode=True, sort_keys=False)
print(f"✅ 去重完成: {len(proxies)} → {len(unique)}")
EOF
          python3 dedup.py || echo "⚠️ 去重异常"

      - name: Clash Speed Test (Google + 下载速度)
        run: |
          echo "📥 下载 clash-speedtest..."
          curl -sL https://github.com/faceair/clash-speedtest/releases/latest/download/clash-speedtest_Linux_x86_64.tar.gz | tar xz || { echo "❌ 工具下载失败"; exit 1; }
          chmod +x clash-speedtest

          echo "🚀 开始严格测速..."
          ./clash-speedtest \
            -c proxies_dedup.yaml \
            --test-url "http://www.gstatic.com/generate_204" \
            --speed-mode download \
            --timeout 12000 \
            --concurrent 4 \
            --max-latency 800 \
            --rename \
            --output proxies_tested.yaml || echo "⚠️ 测速工具返回非零，继续处理"

          if [ -f proxies_tested.yaml ] && grep -q "proxies:" proxies_tested.yaml; then
            node_count=$(grep -c "^  - " proxies_tested.yaml || echo 0)
            if [ "$node_count" -ge 5 ]; then
              cp proxies_tested.yaml proxies.yaml
              echo "✅ 使用测速结果（$node_count 个节点）"
            else
              cp proxies_dedup.yaml proxies.yaml
              echo "⚠️ 节点过少，回退去重文件"
            fi
          else
            cp proxies_dedup.yaml proxies.yaml
            echo "⚠️ 测速失败，使用去重文件"
          fi

      - name: Commit if changed
        run: |
          git add proxies.yaml stars.svg raw_proxies.yaml proxies_dedup.yaml || true
          if git diff --cached --quiet; then
            echo "ℹ️ 无变更，跳过提交"
          else
            git commit -m "Update: strict speed test + dedup ($(date '+%Y-%m-%d %H:%M:%S'))" || true
            git push || echo "⚠️ push 失败"
            echo "✅ 更新完成"
          fi
