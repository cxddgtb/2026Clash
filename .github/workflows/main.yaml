name: Fetch & Strict Google + Download Speed Test (High Concurrent)

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

permissions:
  contents: write

# ====================== 新增：并发控制 ======================
concurrency:
  group: clash-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Config Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Cache clash-speedtest
        uses: actions/cache@v4
        with:
          path: clash-speedtest
          key: clash-speedtest-linux-latest

      - name: Download raw proxies & stars
        env:
          PROXIES_URL: ${{ secrets.PROXIES_URL }}
        run: |
          timeout 10 curl -f "https://api.star-history.com/svg?repos=cxddgtb/2026Clash&type=Date" > stars.svg || true
          curl -f -L "$PROXIES_URL" -o raw_proxies.yaml || { echo "Failed to fetch proxies"; exit 1; }

      - name: Deduplicate + 过滤垃圾节点
        run: python3 dedup.py

      - name: Strict Clash Speed Test (Google + 下载速度 + 高并发)
        timeout-minutes: 40
        run: |
          # 如果缓存失效才重新下载
          if [ ! -f clash-speedtest ]; then
            curl -sL https://github.com/faceair/clash-speedtest/releases/latest/download/clash-speedtest_Linux_x86_64.tar.gz | tar xz
            chmod +x clash-speedtest
          fi

          echo "开始严格测速（高并发12 + Google + ≥1MB/s + ≤5000ms）..."
          ./clash-speedtest \
            -c proxies_dedup.yaml \
            -output proxies_tested.yaml \
            -rename \
            -speed-mode download \
            -server-url "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" \
            -max-latency 5000ms \
            -min-download-speed 1 \
            -max-packet-loss 10 \
            -timeout 10s \
            -concurrent 12 || echo "测速异常，使用去重文件"

          if [ -f proxies_tested.yaml ] && grep -q "proxies:" proxies_tested.yaml && [ "$(grep -c "server:" proxies_tested.yaml)" -gt 5 ]; then
            cp proxies_tested.yaml proxies.yaml
            echo "✅ 严格测速完成，使用优质节点"
          else
            cp proxies_dedup.yaml proxies.yaml
            echo "⚠️ 测速后节点不足，使用去重文件"
          fi

      - name: Generate Node Statistics
        run: python3 generate_stats.py

      - name: Build Full Config with Latest Rules
        run: python3 build_full_config.py

      - name: Validate Final Config
        run: python3 -c '
import yaml, sys
with open("proxies.yaml") as f:
    data = yaml.safe_load(f)
assert "proxies" in data and len(data["proxies"]) > 0, "配置无效"
print("✅ proxies.yaml 验证通过")
'

      - name: Commit changes
        run: |
          git add proxies.yaml nodes_stats.md stars.svg raw_proxies.yaml proxies_dedup.yaml || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update: 严格测速 + Loyalsoldier全规则 + 节点统计 ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
            echo "✅ 提交成功"
          fi
