name: Fetch & Strictest Google + Download Speed Test (境内最严格)

on:
  schedule:
    - cron: "0 21 * * *"      # 北京时间每天早上 5:00（UTC 21:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Config Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Update proxies and stars
        env:
          PROXIES_URL: ${{ secrets.PROXIES_URL }}
        run: |
          timeout 10 curl -f "https://api.star-history.com/svg?repos=PuddinCat/BestClash&type=Date" > /tmp/stars.svg && mv /tmp/stars.svg . || echo "stars.svg skipped"

          curl -f -L "$PROXIES_URL" -o raw_proxies.yaml
          [ $? -ne 0 ] && { echo "❌ Failed to fetch proxies"; exit 1; }

      - name: Deduplicate proxies（节点去重）
        run: |
          cat > dedup.py << 'EOF'
import yaml
import hashlib

with open('raw_proxies.yaml', 'r', encoding='utf-8') as f:
    data = yaml.safe_load(f)

proxies = data.get('proxies', [])
seen = {}
unique_proxies = []

for p in proxies:
    if not isinstance(p, dict) or 'server' not in p or 'port' not in p:
        continue
    key_str = f"{p.get('type')}|{p.get('server')}|{p.get('port')}|{p.get('cipher')}|{p.get('password')}"
    key = hashlib.md5(key_str.encode()).hexdigest()
    if key not in seen:
        seen[key] = True
        unique_proxies.append(p)

data['proxies'] = unique_proxies
with open('proxies_dedup.yaml', 'w', encoding='utf-8') as f:
    yaml.dump(data, f, allow_unicode=True, sort_keys=False)

print(f"原始节点: {len(proxies)} → 去重后: {len(unique_proxies)}")
EOF
          python3 dedup.py

      - name: Install clash-speedtest & 最严格 Google + 下载速度测速
        run: |
          # 下载最新版 clash-speedtest
          curl -sL https://github.com/faceair/clash-speedtest/releases/latest/download/clash-speedtest_Linux_x86_64.tar.gz | tar xz
          chmod +x clash-speedtest

          echo "🚀 开始【最严格】境内 Google + 下载速度测速（延迟≤600ms + 下载≥8MB/s + 丢包≤5%）..."

          ./clash-speedtest \
            -c proxies_dedup.yaml \
            --server-url "http://www.gstatic.com/generate_204" \
            --speed-mode download \      # 启用下载速度测试
            --timeout 12000 \
            --concurrent 4 \
            --max-latency 600 \          # 严格延迟
            --max-packet-loss 5 \        # 严格丢包率
            --min-download-speed 8 \     # 新增：最低下载速度 8 MB/s
            --rename \                   # 节点名自动加入位置 + 延迟 + 下载速度
            --output proxies_tested.yaml

          # 回退机制：如果严格过滤后节点过少（少于 5 个），使用去重文件
          if [ ! -f proxies_tested.yaml ] || [ $(grep -c 'proxies:' proxies_tested.yaml || echo 0) -lt 5 ]; then
            echo "⚠️ 严格过滤后节点过少，使用去重后的文件"
            cp proxies_dedup.yaml proxies.yaml
          else
            cp proxies_tested.yaml proxies.yaml
            echo "✅ 最严格测速完成！已过滤无法稳定访问 Google 或下载速度不足的节点"
          fi

      - name: Commit if changed
        run: |
          git add proxies.yaml stars.svg raw_proxies.yaml proxies_dedup.yaml || true
          if ! git diff --cached --quiet; then
            git commit -m "Update: 最严格 Google + 下载速度测速 + dedup ($(date '+%Y-%m-%d %H:%M:%S' -u) UTC)"
            git push
            echo "✅ 更新完成（境内最严格过滤）"
          else
            echo "ℹ️ 无变化"
          fi
