name: Build Clash Config

on:
  schedule:
    - cron: "0 */5 * * *"  # 每 5 小时自动运行
  workflow_dispatch:       # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Prepare subscription URLs (bypass 64KB limit)
        run: |
          # ✅ 方案：使用文件传递长订阅，绕过 GitHub Actions 64KB 环境变量限制
          if [ -n "${{ secrets.PROXIES_URLS }}" ]; then
            echo "${{ secrets.PROXIES_URLS }}" > proxies_urls.txt
            echo "PROXIES_URLS_FILE=proxies_urls.txt" >> $GITHUB_ENV
            echo "[INFO] 已从 Secret 加载订阅链接到文件"
          else
            echo "[WARN] 未设置 PROXIES_URLS Secret，将使用空配置"
            touch proxies_urls.txt
            echo "PROXIES_URLS_FILE=proxies_urls.txt" >> $GITHUB_ENV
          fi

      - name: Fetch and parse proxies (enhanced)
        run: python fetch_proxies.py
        env:
          PROXIES_URLS_FILE: ${{ env.PROXIES_URLS_FILE }}

      - name: Deduplicate proxies (smart)
        run: python dedup.py

      - name: Split for parallel speedtest
        run: python split_proxies.py

      - name: Speedtest chunk 1/8
        run: python clash-speedtest.py --chunk 1 --max-latency 15000 --timeout 4
        continue-on-error: true

      - name: Speedtest chunk 2/8
        run: python clash-speedtest.py --chunk 2 --max-latency 15000 --timeout 4
        continue-on-error: true

      - name: Speedtest chunk 3/8
        run: python clash-speedtest.py --chunk 3 --max-latency 15000 --timeout 4
        continue-on-error: true

      - name: Speedtest chunk 4/8
        run: python clash-speedtest.py --chunk 4 --max-latency 15000 --timeout 4
        continue-on-error: true

      - name: Speedtest chunk 5/8
        run: python clash-speedtest.py --chunk 5 --max-latency 15000 --timeout 4
        continue-on-error: true

      - name: Speedtest chunk 6/8
        run: python clash-speedtest.py --chunk 6 --max-latency 15000 --timeout 4
        continue-on-error: true

      - name: Speedtest chunk 7/8
        run: python clash-speedtest.py --chunk 7 --max-latency 15000 --timeout 4
        continue-on-error: true

      - name: Speedtest chunk 8/8
        run: python clash-speedtest.py --chunk 8 --max-latency 15000 --timeout 4
        continue-on-error: true

      - name: Merge speedtest results
        run: python merge_chunks.py

      - name: Filter low latency & test download
        run: python filter_low_latency.py --min-download-speed 0.3

      - name: Enhance proxy names with speed
        run: python enhance_names.py

      - name: Generate final config
        run: python build_full_config.py

      - name: Generate stats report
        run: python generate_stats.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "🔄 Auto-update: $(date '+%Y-%m-%d %H:%M') [CI Skip]"
            git push -f
            echo "[✅] 配置已更新并推送"
          else
            echo "[ℹ️] 无变更，跳过推送"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: clash-config
          path: |
            clash.yaml
            proxies.yaml
            nodes_stats.md
          retention-days: 7
