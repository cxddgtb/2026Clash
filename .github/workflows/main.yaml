name: Fetch & Strict Google + Download Speed Test

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Config Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Download raw proxies & stars
        env:
          PROXIES_URL: ${{ secrets.PROXIES_URL }}
        run: |
          timeout 10 curl -f "https://api.star-history.com/svg?repos=PuddinCat/BestClash&type=Date" > stars.svg || echo "stars skipped"
          curl -f -L "$PROXIES_URL" -o raw_proxies.yaml || { echo "❌ Failed to fetch proxies"; exit 1; }

      - name: Deduplicate proxies
        run: |
          cat > dedup.py << 'EOF'
import yaml, hashlib
with open('raw_proxies.yaml', encoding='utf-8') as f:
    data = yaml.safe_load(f) or {}
proxies = data.get('proxies', [])
seen = {}
unique = []
for p in proxies:
    if not isinstance(p, dict) or not p.get('server') or not p.get('port'): continue
    key = hashlib.md5(f"{p.get('type')}|{p.get('server')}|{p.get('port')}|{p.get('password')}".encode()).hexdigest()
    if key not in seen:
        seen[key] = True
        unique.append(p)
data['proxies'] = unique
with open('proxies_dedup.yaml', 'w', encoding='utf-8') as f:
    yaml.dump(data, f, allow_unicode=True, sort_keys=False)
print(f"去重: {len(proxies)} → {len(unique)}")
EOF
          python3 dedup.py

      - name: Clash Speed Test (Google + 下载速度)
        run: |
          # 下载工具
          curl -sL https://github.com/faceair/clash-speedtest/releases/latest/download/clash-speedtest_Linux_x86_64.tar.gz | tar xz
          chmod +x clash-speedtest

          echo "开始严格测速..."

          ./clash-speedtest \
            -c proxies_dedup.yaml \
            --test-url "http://www.gstatic.com/generate_204" \
            --speed-mode download \
            --timeout 10000 \
            --concurrent 4 \
            --max-latency 800 \
            --rename \
            --output proxies_tested.yaml || echo "测速工具执行异常"

          if [ -f proxies_tested.yaml ] && grep -q "proxies:" proxies_tested.yaml; then
            cp proxies_tested.yaml proxies.yaml
            echo "✅ 使用测速后的文件"
          else
            cp proxies_dedup.yaml proxies.yaml
            echo "⚠️ 使用去重文件（测速失败或节点过少）"
          fi

      - name: Commit changes
        run: |
          git add proxies.yaml stars.svg raw_proxies.yaml proxies_dedup.yaml || true
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "Update: strict speed test + dedup ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
            echo "✅ 提交成功"
          fi
